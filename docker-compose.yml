version: "3.9"

# ============================================================
# Smart Insole — Docker Compose
# Khởi động toàn bộ hệ thống:
#   docker-compose up --build
#
# Services:
#   backend   → FastAPI     http://localhost:8000
#   postgres  → PostgreSQL  port 5432
#   influxdb  → InfluxDB    http://localhost:8086
#   nginx     → Reverse proxy + serve frontend  http://localhost:80
#
# Dừng và xóa volumes (reset data):
#   docker-compose down -v
# ============================================================

services:

  # ----------------------------------------------------------
  # PostgreSQL — dữ liệu có cấu trúc
  # (patients, sessions, predictions, reports)
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: smartinsole_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartinsole
      POSTGRES_PASSWORD: smartinsole_pass
      POSTGRES_DB: smartinsole
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"           # expose ra host để dùng pgAdmin/DBeaver khi dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartinsole -d smartinsole"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------
  # InfluxDB — time-series sensor data (50Hz)
  # ----------------------------------------------------------
  influxdb:
    image: influxdb:2.7-alpine
    container_name: smartinsole_influxdb
    restart: unless-stopped
    env_file: .env                 # đọc DOCKER_INFLUXDB_INIT_* từ .env
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    ports:
      - "8086:8086"               # InfluxDB UI: http://localhost:8086
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ----------------------------------------------------------
  # Backend — FastAPI
  # ----------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smartinsole_backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Override host thành tên service (không phải localhost)
      POSTGRES_URL: postgresql://smartinsole:smartinsole_pass@postgres:5432/smartinsole
      INFLUXDB_URL: http://influxdb:8086
    volumes:
      # Mount thư mục ml/ để backend truy cập model và label encoder
      - ./ml:/app/ml:ro
      # Mount code khi dev để reload không cần rebuild image
      - ./backend:/app/backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ----------------------------------------------------------
  # Nginx — reverse proxy + serve React frontend
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: smartinsole_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro   # React build output
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3


# ============================================================
# Named volumes — data tồn tại khi restart container
# ============================================================
volumes:
  postgres_data:
    driver: local
  influxdb_data:
    driver: local
  influxdb_config:
    driver: local